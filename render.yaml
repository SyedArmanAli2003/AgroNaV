services:
  - type: web
    name: agronav
    runtime: docker
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: "production"
      - key: FRONTEND_URL
        value: "https://agronav.onrender.com"
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        sync: false
