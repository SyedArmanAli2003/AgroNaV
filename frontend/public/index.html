<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <!-- Lock viewport for native-feeling mobile UI (no pinch-zoom, fits notches) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- Preconnect to backend + weather API for faster first API call on 2G -->
    <link rel="preconnect" href="http://localhost:8000">
    <link rel="dns-prefetch" href="http://localhost:8000">
    <link rel="preconnect" href="https://api.open-meteo.com">
    <link rel="dns-prefetch" href="https://api.open-meteo.com">

    <!-- Critical CSS: shows the dark background and a green spinner from raw HTML,
         before ANY JavaScript parses. On 2G this eliminates the white flash
         and gives users a visual response within ~300ms. -->
    <style>
      body {
        background-color: #0f1a14;
        color: #e8f5e9;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      /* Show spinner on the empty root div until React mounts */
      #root:empty::after {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        margin: 45vh auto;
        border-radius: 50%;
        border: 3px solid #1D9E75;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <meta name="theme-color" content="#1D9E75" />
    <meta name="description" content="AgroNav — Syngenta field sales rep assistant" />

    <!-- iOS PWA / Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AgroNav" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>AgroNav — Field Sales Assistant</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Google Charts -->
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Source+Serif+4:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
