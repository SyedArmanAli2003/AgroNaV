<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="AgroNav — Syngenta field sales rep assistant for smarter visits">

  <title>AgroNav — Field Sales Assistant</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="static/style.css">

  <!-- Google Charts -->
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Vue Router 4 CDN -->
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
</head>
<body>
  <div id="app"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App modules -->
  <script src="src/services/api.js"></script>
  <script src="src/services/offline.js"></script>
  <script src="src/components/NavBar.js"></script>
  <script src="src/components/StatsRow.js"></script>
  <script src="src/components/MapView.js"></script>
  <script src="src/components/OutletCard.js"></script>
  <script src="src/components/NBACard.js"></script>
  <script src="src/components/AlertCard.js"></script>
  <script src="src/views/Dashboard.js"></script>
  <script src="src/views/Visit.js"></script>
  <script src="src/views/Alerts.js"></script>
  <script src="src/views/Outcomes.js"></script>
  <script src="src/router.js"></script>
  <script src="src/main.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.log('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
